front:
  text: 大方廣圓覺修多羅了義經略疏序金紫光祿大夫守中書侍郎尚書門下平章事充集賢殿大學士裴休撰夫血氣之屬必有知凡有知者必同體所謂真淨明妙虛徹靈通卓然而獨存者也是眾生之本源故曰心地是諸佛之所得故曰菩提交徹融攝故曰法界寂靜常樂故曰涅槃不濁不漏故曰清淨不妄不變故曰真如離過絕非故曰佛性護善遮惡故曰總持隱覆含攝故曰如來藏超越玄閟故曰密嚴國統眾德而大備爍群昏而獨照故曰圓覺其實皆一心也背之則凡順之則聖迷之則生死始悟之則輪迴息親而求之則止觀定慧推而廣之則六度萬行引而為智然後為正智依而為因然後為正因其實皆一法也終日圓覺而未嘗圓覺者凡夫也欲證圓而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證蓋證此也如來為一大事出現蓋為此也三藏十二部一切脩多羅蓋詮此也然如來垂教指法有顯密立義有廣略乘時有先後當機有深淺非上根圓智其孰能大通之故如來於光明藏與十二大士密說而顯演潛通而廣被以印定其法為一切經之宗也圭峯禪師得法於荷澤嫡孫南印上足道圓和尚一日隨眾僧齋于州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大弘圓頓之教此經諸佛授汝耳禪師既佩南宗密印受圓覺懸記於是閱大藏經律通唯識起信等論然後頓轡於華嚴法界宴坐於圓覺妙場究一雨之所霑窮五教之殊致乃為之疏解凡大疏三卷大鈔十三卷略疏兩卷小鈔六卷道場脩證儀一十八卷並行於世其敘教也圓其見法也徹其釋義也端如析薪其入觀也明若秉燭其辭也極於理而已不虛騁其文也扶於教而已不苟飾不以其所長病人故無排斥之說不以其未至蓋人故無胸臆之論蕩蕩然實十二部經之眼目三十五祖之骨髓生靈之大本三世之達道後世雖有作者不能過矣其四依之一乎或淨土之親聞乎何盡其義味如此也或曰道無形視者莫能覩道無方行者莫能至況文字乎在性之而已豈區區數萬言而可詮之哉對曰噫是不足以語道也前不云乎統眾德而大備爍群昏而獨照者圓覺也蓋圓覺能出一切法一切法未嘗離圓覺今夫經律論三藏之文傳于中國者五千餘卷其所詮者何也戒定慧而已修戒定慧而求者何也圓覺而已圓覺一法也張萬行而求之者何眾生之根器異也然則大藏皆圓覺之經此疏乃大藏之疏也羅五千軸之文而以數卷之疏通之豈不至簡哉何言其繁也及其斷言語之道息思想之心忘能所滅影像然後為得也固不在詮表耳嗚呼生靈之所以往來者六道也鬼神沈幽愁之苦鳥獸懷獝狘之悲脩羅方瞋諸天正樂可以整心慮趣菩提唯人道為能耳人而不為吾末如之何也已矣休常遊禪師之閫域受禪師之顯訣無以自効輒直讚其法而普告大眾耳其他備乎本序云大方廣圓覺修多羅了義經序唐終南山草堂寺沙門宗密述元亨利貞乾之德也始於一氣常樂我淨佛之德也本乎一心專一氣而致柔修一心而成道心也者沖虛妙粹炳煥靈明無去無來冥通三際非中非外洞徹十方不滅不生豈四山之可害離性離相奚五色之能盲處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天大矣哉萬法資始也萬法虛偽緣會而生生法本無一切唯識識如幻夢但是一心心寂而知目之圓覺彌滿清淨中不容他故德用無邊皆同一性性起為相境智歷然相得性融身心廓爾方之海印越彼太虛恢恢焉晃晃焉逈出思議之表也我佛證此愍物迷之再嘆奇哉三思大事既全十力能摧樹下魔軍爰起四心欲示宅中寶藏然迷頭捨父悟有易難故仙苑覺場教興頓漸漸設五時之異空有迭彰頓無二諦之殊幽靈絕待今此經者頓之類歟故如來入寂光土凡聖一源現受用身主伴同會曼殊大士創問本起之因薄伽至尊首提究竟之果照斯真體滅彼夢形知無我人誰受輪轉種種幻化生於覺心幻盡覺圓心通法遍心本是佛由念起而漂沈岸實不移因舟行而鶩驟頓除妄宰空不生華漸竭愛源金無重鑛理絕修證智似階差覺前前非名後後位況妄忘起滅德等圓明者焉然出厩良駒已搖鞭影埋塵大寶須設治方故三觀澄明真假俱入諸輪綺互單複圓脩四相潛神非覺違拒四病出體心華發明復令長中下期克念攝念而加行別遍互習業障惑障而消亡成就慧身靜極覺遍百千世界佛境現前是以聞五種名超剎寶施福說半偈義勝河沙小乘實由無法不持無機不被者也噫巴歌和眾似量騰於猿心雪曲應稀了義匿於龍藏宗密𮫁專魯誥冠討竺墳俱溺筌罤唯味糠粕幸於涪上針芥相投禪遇南宗教逢斯典一言之下心地開通一軸之中義天朗耀頃以道非常道諸行無常今知心是佛心定當作佛然佛稱種智修假多聞故復行詣百城坐探群籍講雖濫泰學且師安叨沐猶吾之納謬當真子之印再逢親友彌感佛恩久慨孤貧將陳法施採集般若綸貫華嚴提挈毘尼發明唯識然醫方萬品宜選對治海寶千般先求如意觀夫文富義博誠讓雜華指體投機無偕圓覺故參詳諸論反復百家以利其器方為疏解冥心聖旨極思研精義備性相禪兼頓漸勒成三卷以傳強學然上中下品根欲性殊今將法彼曲成從其易簡更搜精要直註本經庶即事即心日益日損者矣大方廣圓覺修多羅了義經序
